<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="My Links - Connect with me on social media">
    <title>My Links | Santosh Mahto</title>
    
    <!-- Font Awesome CDN (Corrected) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/profile.png">
</head>
<body>

    <div class="container">
        
        <!-- Profile Section with Image -->
        <div class="profile-header">
            <div class="profile-image">
                <img src="images/profile.png" alt="Profile Picture" id="profile-img">
            </div>
            <h1 class="profile-name">Santosh Mahto</h1>
            <div class="location-tag">📍 My Links :)</div>
        </div>

        <!-- Social Icons Bar -->
        <div class="social-icons">
            <a href="https://www.linkedin.com/in/santosh-mahto-9a4066393" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                <i class="fa-brands fa-linkedin"></i>
            </a>
            <a href="https://www.instagram.com/santoshms1" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://github.com/itsme-sudo" target="_blank" rel="noopener noreferrer" aria-label="GitHub Portfolio">
                <i class="fa-brands fa-github"></i>
            </a>
            <a href="https://yt.oia.bio/d6asj" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
                <i class="fa-brands fa-youtube"></i>
            </a>
        </div>

        <!-- Links Stack -->
        <div class="links-list">
            
            <!-- Link 1 -->
            <a href="https://itsme-sudo.github.io/Guarantee-Confession-/" class="link-card" data-tilt>
                <div class="link-visual icon-github">
                    <i class="fa-solid fa-heart"></i>
                </div>
                <div class="link-text">Confession Site</div>
                <div class="menu-dots">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </div>
            </a>
 
            <!-- Link 2 -->
            <a href="https://itsme-sudo.github.io/Prank-" class="link-card" data-tilt>
                <div class="link-visual icon-prank">
                    <i class="fa-solid fa-face-laugh-wink"></i>
                </div>
                <div class="link-text">Prank Site</div>
                <div class="menu-dots">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </div>
            </a>
 
            <!-- Link 3 -->
            <a href="https://t.me/+ipcJsWhCJPAwZjM1" class="link-card" data-tilt>
                <div class="link-visual icon-telegram">
                    <i class="fa-brands fa-telegram"></i>
                </div>
                <div class="link-text">Join My Telegram Channel</div>
                <div class="menu-dots">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </div>
            </a>
 
            <!-- Link 4 -->
            <a href="https://www.linkedin.com/in/santosh-mahto-9a4066393" class="link-card" data-tilt>
                <div class="link-visual icon-linkedin">
                    <i class="fa-brands fa-linkedin"></i>
                </div>
                <div class="link-text">LinkedIn</div>
                <div class="menu-dots">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </div>
            </a>

            <!-- Link 5 -->
            <a href="https://www.instagram.com/santoshms1" class="link-card" data-tilt>
                <div class="link-visual icon-instagram">
                    <i class="fa-brands fa-instagram"></i>
                </div>
                <div class="link-text">Instagram</div>
                <div class="menu-dots">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </div>
            </a>

            <!-- Link 6 -->
            <a href="https://itsme-sudo.github.io/Portfolio-/" class="link-card" data-tilt>
                <div class="link-visual icon-portfolio">
                    <i class="fa-solid fa-briefcase"></i>
                </div>
                <div class="link-text">My Portfolio</div>
                <div class="menu-dots">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </div>
            </a>

            <!-- Link 7 -->
            <a href="https://yt.oia.bio/d6asj" class="link-card" data-tilt>
                <div class="link-visual icon-youtube">
                    <i class="fa-brands fa-youtube"></i>
                </div>
                <div class="link-text">Subscribe on YouTube</div>
                <div class="menu-dots">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </div>
            </a>

        </div>
        
        <!-- Footer -->
        <footer class="footer">
            <p>Made with ❤️ by Santosh</p>
            <button id="theme-toggle" class="theme-btn">
                <i class="fa-solid fa-moon"></i> Dark Mode
            </button>
        </footer>
    </div>

    <!-- External JavaScript -->
    <script src="js/script.js"></script>
</body>
</html>
